name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check app tests

      - name: Run mypy
        run: mypy app

      - name: Run tests with coverage gate
        run: pytest -q

  container-smoke-test:
    name: PostgreSQL pgvector integration test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow-ci-password
      POSTGRES_DB: agentflow
      POSTGRES_PORT: "5433"
      BACKEND_PORT: "8000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start production stack
        run: docker compose up --build --detach

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent \
              http://127.0.0.1:8000/api/v1/health; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs
          exit 1

      - name: Verify migrations and pgvector
        run: |
          docker compose exec -T postgres \
            psql -U agentflow -d agentflow -tAc \
            "SELECT version_num FROM alembic_version;" \
            | grep -Fx "808eea38fb4f"

          docker compose exec -T postgres \
            psql -U agentflow -d agentflow -tAc \
            "SELECT extname FROM pg_extension WHERE extname = 'vector';" \
            | grep -Fx "vector"

      - name: Stop production stack
        if: always()
        run: docker compose down --volumes --remove-orphans
