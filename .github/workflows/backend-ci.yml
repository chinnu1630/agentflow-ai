name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check app tests

      - name: Run mypy
        run: mypy app

      - name: Run tests with coverage gate
        run: pytest -q

  container-smoke-test:
    name: Build and smoke-test container
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build --tag agentflow-ai-backend:ci backend

      - name: Run container
        run: |
          docker run --detach \
            --name agentflow-backend-ci \
            --publish 8000:8000 \
            agentflow-ai-backend:ci

      - name: Verify health endpoint
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent \
              http://127.0.0.1:8000/api/v1/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs agentflow-backend-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm --force agentflow-backend-ci || true
